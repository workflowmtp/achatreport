<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuditAchats Pro — Pilotage & Contrôle des Achats (Sage X3)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --sidebar:#0F172A; --sidebar-2:#1E293B; --sidebar-hov:#334155;
  --bg:#F1F5F9; --card:#FFFFFF; --border:#E2E8F0; --line:#EDF2F7;
  --txt:#0F172A; --txt-2:#475569; --txt-3:#94A3B8;
  --brand:#2563EB; --brand-2:#1D4ED8;
  --info:#0EA5E9; --ok:#16A34A; --warn:#F59E0B; --imp:#EA580C; --crit:#DC2626;
  --info-bg:#E0F2FE; --ok-bg:#DCFCE7; --warn-bg:#FEF3C7; --imp-bg:#FFEDD5; --crit-bg:#FEE2E2;
  --shadow:0 1px 2px rgba(15,23,42,.06),0 1px 3px rgba(15,23,42,.04);
  --shadow-lg:0 10px 30px rgba(15,23,42,.12);
  --r:12px; --r-sm:8px;
}
[data-theme="dark"]{
  --bg:#0B1220; --card:#111A2E; --border:#22304A; --line:#1B2840;
  --txt:#E2E8F0; --txt-2:#94A3B8; --txt-3:#64748B;
  --info-bg:#0c2a3a; --ok-bg:#0d2a1a; --warn-bg:#3a2e0c; --imp-bg:#3a230c; --crit-bg:#3a1414;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--txt)}
a{color:var(--brand);text-decoration:none}

/* LOGIN */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0F172A,#1E293B);z-index:50}
.login-card{background:var(--card);border-radius:16px;padding:36px;width:440px;max-width:92vw;box-shadow:var(--shadow-lg)}
.login-card h1{font-size:22px;font-weight:700;margin-bottom:4px}
.login-card .sub{color:var(--txt-2);font-size:13px;margin-bottom:22px}
.login-card .erp{display:inline-flex;align-items:center;gap:6px;background:var(--info-bg);color:var(--info);font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;margin-bottom:18px}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.profile-btn{border:1.5px solid var(--border);border-radius:var(--r-sm);padding:12px;text-align:left;transition:.15s;background:var(--card)}
.profile-btn:hover{border-color:var(--brand);background:var(--bg)}
.profile-btn b{display:block;font-size:13px;font-weight:600}
.profile-btn span{font-size:11px;color:var(--txt-3)}

/* SHELL */
#shell{display:none;height:100vh}
#shell.on{display:grid;grid-template-columns:248px 1fr;grid-template-rows:auto 1fr}
.sidebar{grid-row:1/3;background:var(--sidebar);color:#CBD5E1;display:flex;flex-direction:column;overflow-y:auto}
.brand{padding:18px 18px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--sidebar-2)}
.brand .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#2563EB,#0EA5E9);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:16px}
.brand b{color:#fff;font-size:15px;display:block;line-height:1.1}
.brand small{font-size:10px;color:#64748B}
.nav{padding:8px}
.nav-grp{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#475569;padding:14px 12px 6px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:13px;color:#CBD5E1;transition:.12s;width:100%;text-align:left;position:relative}
.nav-item:hover{background:var(--sidebar-2);color:#fff}
.nav-item.active{background:var(--brand);color:#fff;font-weight:600}
.nav-item .ic{width:18px;text-align:center;flex-shrink:0}
.nav-item .badge{margin-left:auto;background:var(--crit);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.nav-item.active .badge{background:rgba(255,255,255,.25)}
.side-foot{margin-top:auto;padding:12px;border-top:1px solid var(--sidebar-2);font-size:11px;color:#64748B}

/* TOPBAR */
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 22px;display:flex;align-items:center;gap:16px;height:60px}
.topbar h2{font-size:17px;font-weight:600}
.topbar .crumb{font-size:12px;color:var(--txt-3)}
.topbar .sp{flex:1}
.icon-btn{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--txt-2);transition:.12s;position:relative}
.icon-btn:hover{background:var(--bg)}
.icon-btn .dot{position:absolute;top:7px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--crit);border:2px solid var(--card)}
.user-chip{display:flex;align-items:center;gap:9px;padding:5px 10px 5px 6px;border-radius:30px;background:var(--bg)}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#2563EB,#0EA5E9);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px}
.user-chip b{font-size:12px;font-weight:600}
.user-chip span{font-size:10px;color:var(--txt-3);display:block}

/* MAIN */
.main{overflow-y:auto;padding:22px}
.page-head{margin-bottom:18px}
.page-head h1{font-size:20px;font-weight:700}
.page-head p{color:var(--txt-2);font-size:13px;margin-top:2px}

/* CARDS / KPI */
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);cursor:pointer;transition:.15s}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--brand)}
.kpi .lbl{font-size:12px;color:var(--txt-2);display:flex;align-items:center;gap:7px}
.kpi .val{font-size:26px;font-weight:700;margin-top:6px}
.kpi .sub{font-size:11px;color:var(--txt-3);margin-top:3px}
.kpi.dim-crit{border-left:4px solid var(--crit)} .kpi.dim-imp{border-left:4px solid var(--imp)}
.kpi.dim-warn{border-left:4px solid var(--warn)} .kpi.dim-ok{border-left:4px solid var(--ok)}
.kpi.dim-info{border-left:4px solid var(--info)} .kpi.dim-brand{border-left:4px solid var(--brand)}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:18px}
.card-h{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.card-h h3{font-size:14px;font-weight:600}
.card-h .sp{flex:1}
.card-b{padding:16px 18px}
.card-b.flush{padding:0}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
@media(max-width:1100px){.grid-2,.grid-3{grid-template-columns:1fr}}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--txt-3);border-bottom:1px solid var(--border);font-weight:600;white-space:nowrap}
tbody td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
tbody tr:hover{background:var(--bg)}
tbody tr:last-child td{border-bottom:none}
td.num,th.num{text-align:right;font-family:'JetBrains Mono',monospace}
.t-wrap{overflow-x:auto}

/* BADGES / PILLS */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.pill.info{background:var(--info-bg);color:var(--info)} .pill.ok{background:var(--ok-bg);color:var(--ok)}
.pill.warn{background:var(--warn-bg);color:var(--warn)} .pill.imp{background:var(--imp-bg);color:var(--imp)}
.pill.crit{background:var(--crit-bg);color:var(--crit)} .pill.mut{background:var(--bg);color:var(--txt-2)}
.dotp{width:7px;height:7px;border-radius:50%;display:inline-block}
.dotp.info{background:var(--info)} .dotp.ok{background:var(--ok)} .dotp.warn{background:var(--warn)}
.dotp.imp{background:var(--imp)} .dotp.crit{background:var(--crit)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:var(--r-sm);font-size:13px;font-weight:600;transition:.12s;border:1px solid transparent}
.btn.primary{background:var(--brand);color:#fff}.btn.primary:hover{background:var(--brand-2)}
.btn.ghost{background:var(--card);border-color:var(--border);color:var(--txt-2)}.btn.ghost:hover{background:var(--bg)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.danger{background:var(--crit);color:#fff}
.input,select.input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--card);outline:none;transition:.12s}
.input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.field{margin-bottom:12px}.field label{display:block;font-size:12px;font-weight:600;color:var(--txt-2);margin-bottom:5px}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.toolbar .input{width:auto;min-width:200px}
.seg{display:inline-flex;background:var(--bg);border-radius:8px;padding:3px;gap:2px}
.seg button{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;color:var(--txt-2)}
.seg button.on{background:var(--card);color:var(--brand);box-shadow:var(--shadow)}

/* PROGRESS / MISC */
.bar{height:7px;border-radius:6px;background:var(--line);overflow:hidden}
.bar>i{display:block;height:100%;border-radius:6px}
.empty{text-align:center;padding:40px;color:var(--txt-3)}
.empty .ic{font-size:34px;opacity:.4}
.tag-deny{opacity:.5}
.muted{color:var(--txt-3)}
.flex{display:flex;align-items:center;gap:8px}
.between{display:flex;align-items:center;justify-content:space-between;gap:10px}
.spark{display:flex;align-items:flex-end;gap:3px;height:38px}
.spark i{flex:1;background:var(--brand);border-radius:2px 2px 0 0;opacity:.85;min-height:2px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px}
.modal{background:var(--card);border-radius:14px;width:680px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-h{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center}
.modal-h h3{font-size:16px;font-weight:700;flex:1}
.modal-b{padding:20px}
.modal-f{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
.kv{display:grid;grid-template-columns:160px 1fr;gap:8px 14px;font-size:13px}
.kv dt{color:var(--txt-2)}.kv dd{font-weight:500}

/* TOAST */
#toasts{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:10px;z-index:80}
.toast{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--brand);border-radius:10px;padding:12px 16px;box-shadow:var(--shadow-lg);min-width:280px;animation:slidein .2s}
.toast.ok{border-left-color:var(--ok)}.toast.warn{border-left-color:var(--warn)}.toast.crit{border-left-color:var(--crit)}
@keyframes slidein{from{transform:translateX(20px);opacity:0}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="erp">● Connecté à Sage X3 — base miroir (lecture seule)</div>
    <h1>AuditAchats Pro</h1>
    <div class="sub">Pilotage, contrôle et audit des achats — MULTIPRINT / MetaBuilding</div>
    <form id="loginForm" autocomplete="on" style="display:flex;flex-direction:column;gap:14px;text-align:left;margin-top:8px">
      <div class="field">
        <label for="kcUser">Nom d'utilisateur</label>
        <input id="kcUser" type="text" autocomplete="username" required
          style="width:100%;padding:11px 13px;border-radius:9px;border:1px solid #cbd5e1;background:transparent;color:inherit;font-size:14px;box-sizing:border-box">
      </div>
      <div class="field">
        <label for="kcPass">Mot de passe</label>
        <input id="kcPass" type="password" autocomplete="current-password" required
          style="width:100%;padding:11px 13px;border-radius:9px;border:1px solid #cbd5e1;background:transparent;color:inherit;font-size:14px;box-sizing:border-box">
      </div>
      <div id="kcErr" style="display:none;color:#DC2626;font-size:13px;line-height:1.4"></div>
      <button id="kcSubmit" type="submit" class="profile-btn"
        style="justify-content:center;font-weight:600;cursor:pointer">Se connecter</button>
    </form>
  </div>
</div>

<!-- SHELL -->
<div id="shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">A</div>
      <div><b>AuditAchats</b><small>Pilotage achats · Sage X3</small></div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="side-foot" id="sideFoot"></div>
  </aside>
  <header class="topbar">
    <div><h2 id="pageTitle">Tableau de bord</h2><div class="crumb" id="crumb">Accueil</div></div>
    <div class="sp"></div>
    <button class="icon-btn" id="btnAlerts" title="Alertes">🔔<span class="dot" id="alertDot" style="display:none"></span></button>
    <button class="icon-btn" id="btnTheme" title="Thème">🌓</button>
    <div class="user-chip" id="userChip"></div>
    <button class="icon-btn" id="btnLogout" title="Changer de profil">⎋</button>
  </header>
  <main class="main" id="view"></main>
</div>

<div id="toasts"></div>

<script>
/* ============================================================
   PARTIE 1 — SOCLE : Util, Store, RBAC, Seed, Router
   Convention : JS vanilla, concaténation de chaînes uniquement.
   ============================================================ */
"use strict";
var App = { state:{ user:null, route:"dashboard" }, views:{}, nav:[] };

/* ---------- UTIL ---------- */
var Util = {
  esc:function(s){
    if(s===null||s===undefined) return "";
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  },
  fcfa:function(n){
    n = Number(n)||0;
    return Math.round(n).toLocaleString("fr-FR").replace(/\u202f/g," ") + " FCFA";
  },
  num:function(n,d){ d=d||0; return (Number(n)||0).toLocaleString("fr-FR",{minimumFractionDigits:d,maximumFractionDigits:d}); },
  pct:function(n){ return (Number(n)||0).toFixed(1)+" %"; },
  date:function(d){ if(!d) return "—"; var x=new Date(d); return x.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"}); },
  today:function(){ return new Date().toISOString().slice(0,10); },
  daysBetween:function(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); },
  uid:function(p){ return (p||"id")+"_"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); },
  TVA:0.1925
};

/* ---------- STORE (localStorage namespacé) ---------- */
var Store = {
  K:"achats_",
  get:function(key,def){
    try{ var v=localStorage.getItem(this.K+key); return v?JSON.parse(v):(def===undefined?null:def); }
    catch(e){ return def===undefined?null:def; }
  },
  set:function(key,val){ try{ localStorage.setItem(this.K+key,JSON.stringify(val)); }catch(e){} },
  del:function(key){ localStorage.removeItem(this.K+key); }
};

/* ---------- RBAC : 7 profils ---------- */
var PERMS = ["dashboard","da","consult","commandes","receptions","factures","stocks","mrp",
  "analyses","anomalies","validations","alertes","documents","journal","exports","ia","params","scoring_ach"];

var ROLES = {
  acheteur:   { label:"Acheteur", desc:"Demandes, consultations, commandes (périmètre)", color:"#2563EB",
    perms:["dashboard","da","consult","commandes","receptions","factures","stocks","mrp","alertes","documents","ia"] },
  da:         { label:"Directeur des achats", desc:"Service complet, scoring, budgets", color:"#7C3AED",
    perms:PERMS.filter(function(p){return p!=="params";}) },
  magasin:    { label:"Magasin / Stocks", desc:"Stocks, réceptions, réappro, MRP", color:"#0EA5E9",
    perms:["dashboard","stocks","mrp","receptions","commandes","alertes","ia"] },
  finance:    { label:"Finance", desc:"Factures, budgets, engagements, écarts", color:"#16A34A",
    perms:["dashboard","factures","analyses","validations","alertes","exports","ia","documents"] },
  qualite:    { label:"Qualité / Maintenance", desc:"Conformité, articles critiques", color:"#F59E0B",
    perms:["dashboard","receptions","stocks","documents","alertes","ia"] },
  dg:         { label:"Direction Générale", desc:"Vision consolidée, risques, abus", color:"#EA580C",
    perms:PERMS.slice() },
  audit:      { label:"Audit / Contrôle interne", desc:"Lecture intégrale, audit (sans modif)", color:"#DC2626",
    perms:["dashboard","da","consult","commandes","receptions","factures","analyses","anomalies","validations","alertes","documents","journal","exports","ia"], readonly:true }
};

var Auth = {
  can:function(perm){ var u=App.state.user; if(!u) return false; var r=ROLES[u.role]; return r && r.perms.indexOf(perm)>=0; },
  readonly:function(){ var u=App.state.user; return u && ROLES[u.role] && ROLES[u.role].readonly; },
  login:function(role){
    App.state.user = { role:role, name:ROLES[role].label, initials:ROLES[role].label.split(" ").map(function(w){return w[0];}).slice(0,2).join("").toUpperCase() };
    Store.set("session", App.state.user);
    Boot.enter();
  },
  logout:function(){ Store.del("session"); App.state.user=null; document.getElementById("shell").classList.remove("on"); document.getElementById("login").style.display="flex"; }
};

/* ---------- TOAST ---------- */
function toast(msg,type){
  var t=document.createElement("div"); t.className="toast "+(type||"");
  t.innerHTML='<div style="font-size:13px">'+Util.esc(msg)+'</div>';
  document.getElementById("toasts").appendChild(t);
  setTimeout(function(){ t.style.opacity="0"; t.style.transform="translateX(20px)"; setTimeout(function(){t.remove();},250); },3200);
}

/* ---------- MODAL ---------- */
var Modal = {
  open:function(title,bodyHtml,footHtml){
    this.close();
    var bg=document.createElement("div"); bg.className="modal-bg"; bg.id="modalBg";
    bg.innerHTML='<div class="modal"><div class="modal-h"><h3>'+Util.esc(title)+'</h3>'+
      '<button class="icon-btn" data-mclose>✕</button></div>'+
      '<div class="modal-b">'+bodyHtml+'</div>'+
      (footHtml?'<div class="modal-f">'+footHtml+'</div>':'')+'</div>';
    document.body.appendChild(bg);
    bg.addEventListener("click",function(e){ if(e.target===bg||e.target.hasAttribute("data-mclose")) Modal.close(); });
  },
  close:function(){ var m=document.getElementById("modalBg"); if(m) m.remove(); }
};

/* ---------- ROUTER ---------- */
var Router = {
  go:function(route){
    if(!Auth.can(route) && route!=="dashboard"){ toast("Accès non autorisé pour votre profil","warn"); return; }
    App.state.route=route; Store.set("route",route);
    document.querySelectorAll(".nav-item").forEach(function(n){ n.classList.toggle("active", n.getAttribute("data-route")===route); });
    var def=App.nav.reduce(function(a,g){ return a.concat(g.items); },[]).filter(function(i){return i.id===route;})[0]||{label:route,crumb:""};
    document.getElementById("pageTitle").textContent=def.label;
    document.getElementById("crumb").textContent=def.crumb||def.label;
    var v=App.views[route];
    document.getElementById("view").innerHTML = v ? v() : '<div class="empty"><div class="ic">🚧</div><p>Module en cours de chargement…</p></div>';
    if(v && App.afterRender[route]) App.afterRender[route]();
    document.getElementById("view").scrollTop=0;
  }
};
App.afterRender={};

/* ---------- NAV DEFINITION ---------- */
App.nav=[
  { grp:"Pilotage", items:[
    {id:"dashboard",label:"Tableau de bord",crumb:"Pilotage · Synthèse",ic:"▦"},
    {id:"alertes",label:"Alertes",crumb:"Pilotage · Alertes",ic:"🔔"},
  ]},
  { grp:"Cycle achat", items:[
    {id:"da",label:"Demandes d'achat",crumb:"Cycle · Demandes",ic:"📝"},
    {id:"consult",label:"Consultations & offres",crumb:"Cycle · Consultations",ic:"⚖"},
    {id:"commandes",label:"Commandes",crumb:"Cycle · Commandes fournisseurs",ic:"📦"},
    {id:"receptions",label:"Réceptions",crumb:"Cycle · Réceptions",ic:"📥"},
    {id:"factures",label:"Factures (3 voies)",crumb:"Cycle · Contrôle factures",ic:"🧾"},
  ]},
  { grp:"Stocks & besoins", items:[
    {id:"stocks",label:"Stocks & sécurité",crumb:"Stocks",ic:"🏬"},
    {id:"mrp",label:"MRP / Réappro",crumb:"Stocks · MRP",ic:"🔄"},
  ]},
  { grp:"Analyse & contrôle", items:[
    {id:"analyses",label:"Analyses",crumb:"Analyses",ic:"📊"},
    {id:"anomalies",label:"Anomalies & abus",crumb:"Contrôle · Anomalies",ic:"⚠"},
    {id:"validations",label:"Validations",crumb:"Contrôle · Validations",ic:"✔"},
  ]},
  { grp:"Audit & IA", items:[
    {id:"documents",label:"Documents scannés",crumb:"Audit · Documents",ic:"📎"},
    {id:"journal",label:"Journal d'activité",crumb:"Audit · Traçabilité",ic:"📜"},
    {id:"exports",label:"Exports audit",crumb:"Audit · Exports",ic:"⬇"},
    {id:"ia",label:"Agent IA achats",crumb:"Assistant IA",ic:"✨"},
  ]},
  { grp:"Configuration", items:[
    {id:"params",label:"Paramètres & délégation",crumb:"Config · Matrice de délégation",ic:"⚙"},
  ]},
];

/* ---------- BOOT ---------- */
var Boot = {
  init:function(){
    Seed.ensure();
    this.renderLogin();
    document.getElementById("btnTheme").addEventListener("click",this.toggleTheme);
    document.getElementById("btnLogout").addEventListener("click",function(){ Auth.logout(); });
    document.getElementById("btnAlerts").addEventListener("click",function(){ Router.go("alertes"); });
    var th=Store.get("theme","light"); document.documentElement.setAttribute("data-theme",th);
    var sess=Store.get("session"); if(sess){ App.state.user=sess; this.enter(); }
  },
  toggleTheme:function(){
    var cur=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";
    document.documentElement.setAttribute("data-theme",cur); Store.set("theme",cur);
  },
  renderLogin:function(){
    var g=document.getElementById("profileGrid"), html="";
    Object.keys(ROLES).forEach(function(k){
      var r=ROLES[k];
      html+='<button class="profile-btn" data-role="'+k+'"><b>'+Util.esc(r.label)+'</b><span>'+Util.esc(r.desc)+'</span></button>';
    });
    g.innerHTML=html;
    g.querySelectorAll(".profile-btn").forEach(function(b){
      b.addEventListener("click",function(){ Auth.login(b.getAttribute("data-role")); });
    });
  },
  enter:function(){
    document.getElementById("login").style.display="none";
    document.getElementById("shell").classList.add("on");
    this.renderNav(); this.renderUser();
    var route=Store.get("route","dashboard"); if(!Auth.can(route)&&route!=="dashboard") route="dashboard";
    Router.go(route);
    if(window.Alerts) Boot.refreshAlertBadges();
  },
  renderNav:function(){
    var nav=document.getElementById("nav"), html="";
    App.nav.forEach(function(grp){
      var items=grp.items.filter(function(i){ return Auth.can(i.id)||i.id==="dashboard"; });
      if(!items.length) return;
      html+='<div class="nav-grp">'+Util.esc(grp.grp)+'</div>';
      items.forEach(function(i){
        html+='<button class="nav-item" data-route="'+i.id+'"><span class="ic">'+i.ic+'</span>'+Util.esc(i.label)+
          '<span class="badge" data-badge="'+i.id+'" style="display:none"></span></button>';
      });
    });
    nav.innerHTML=html;
    nav.querySelectorAll(".nav-item").forEach(function(n){ n.addEventListener("click",function(){ Router.go(n.getAttribute("data-route")); }); });
    document.getElementById("sideFoot").innerHTML='Profil : <b style="color:#CBD5E1">'+Util.esc(ROLES[App.state.user.role].label)+'</b>'+
      (Auth.readonly()?' · <span style="color:#F59E0B">lecture seule</span>':'');
  },
  renderUser:function(){
    var u=App.state.user, r=ROLES[u.role];
    document.getElementById("userChip").innerHTML='<div class="avatar" style="background:'+r.color+'">'+Util.esc(u.initials)+'</div>'+
      '<div><b>'+Util.esc(u.name)+'</b><span>'+(Auth.readonly()?"Lecture seule":"Connecté")+'</span></div>';
  },
  refreshAlertBadges:function(){
    if(!window.Alerts) return;
    var list=Alerts.all(), crit=list.filter(function(a){return a.prio==="crit"&&!a.done;}).length;
    var dot=document.getElementById("alertDot"); dot.style.display=crit>0?"block":"none";
    var b=document.querySelector('[data-badge="alertes"]'); if(b){ b.textContent=crit; b.style.display=crit>0?"":"none"; }
    var an=document.querySelector('[data-badge="anomalies"]');
    if(an && window.Anomalies){ var na=Anomalies.all().filter(function(x){return x.prio==="crit";}).length; an.textContent=na; an.style.display=na>0?"":"none"; }
  }
};
</script>
<script>
/* ============================================================
   PARTIE 1bis — DONNÉES (miroir Sage X3) + Matrice délégation
   ============================================================ */
var DB = {};
var Seed = {
  ensure:function(){
    if(Store.get("seeded")){ DB = Store.get("db"); this.matrix=Store.get("matrix")||this.defaultMatrix(); return; }
    DB = this.build();
    this.matrix = this.defaultMatrix();
    Store.set("db",DB); Store.set("matrix",this.matrix); Store.set("seeded",1);
  },
  save:function(){ Store.set("db",DB); },
  reset:function(){ Store.del("seeded"); Store.del("db"); Store.del("matrix"); Store.del("journal"); this.ensure(); },

  defaultMatrix:function(){
    return {
      paliers:[
        {code:"P1",min:0,        max:250000,    valid:"Acheteur",                  consult:1, dbl:false, comment:false, note:"Prix catalogue accepté"},
        {code:"P2",min:250001,   max:1000000,   valid:"Acheteur + Resp. achats",   consult:2, dbl:false, comment:true,  note:"Commentaire si fournisseur unique"},
        {code:"P3",min:1000001,  max:5000000,   valid:"Directeur des achats",      consult:3, dbl:true,  comment:true,  note:"Double validation Achats + Finance"},
        {code:"P4",min:5000001,  max:25000000,  valid:"Directeur Général",         consult:3, dbl:true,  comment:true,  note:"Grille comparative obligatoire"},
        {code:"P5",min:25000001, max:null,      valid:"DG + PCA / Conseil",        consult:4, dbl:true,  comment:true,  note:"Appel d'offres + note d'opportunité"}
      ],
      regles:{
        urgenceMaxPalier:"P3", urgenceRegulHeures:48,
        fractionnementJours:30,
        heureDebutNormale:7, heureFinNormale:19,
        kycObligatoire:true, ribDoubleValid:true
      }
    };
  },
  palierFor:function(montant){
    var p=this.matrix.paliers, i;
    for(i=0;i<p.length;i++){ if(montant>=p[i].min && (p[i].max===null||montant<=p[i].max)) return p[i]; }
    return p[p.length-1];
  },

  build:function(){
    var rnd=function(a,b){ return Math.floor(Math.random()*(b-a+1))+a; };
    var pick=function(a){ return a[rnd(0,a.length-1)]; };
    var dOff=function(days){ var d=new Date(); d.setDate(d.getDate()+days); return d.toISOString().slice(0,10); };

    /* Fournisseurs */
    var fourNoms=["IMPRIM-SUPPLY SARL","CIMENCAM DISTRIB","STEEL COILS CMR","POLYMER PACK SA","BY STEEL","SPEED LOGISTICS SARL",
      "ENCRES & SOLVANTS CI","ALU PROFILES DLA","EPS MATERIALS CO","HARDWARE IMPORT GROUP","VITRAGE OUEST","QUINCAILLERIE CENTRALE",
      "TRANSIT KRIBI PORT","CHEMICALS WAFRICA","PACKAGING PLUS"];
    var fournisseurs=fourNoms.map(function(nom,i){
      var homol = i!==5 && i!==10; // 2 non homologués
      var notes=[92,88,75,81,64,55,79,86,70,90,48,72,83,67,77];
      return { id:"FRN"+(100+i), nom:nom, niu:"P"+rnd(100000000,999999999)+"M", rccm:"RC/DLA/"+rnd(2018,2024)+"/B/"+rnd(1000,9999),
        homologue:homol, kyc: i!==4 && i!==10, note:notes[i],
        delaiMoyen:rnd(7,45), tauxConf:rnd(72,99), retards:rnd(0,9),
        cond:pick(["30j net","45j net","Comptant","60j net","Acompte 40%"]),
        risque: notes[i]>85?"fiable": notes[i]>70?"surveiller": notes[i]>55?"risque":"remplacer",
        ribModifie: i===10, dateCreation:dOff(-rnd(60,900)), categorie: i<4?"stratégique":"standard" };
    });

    /* Articles + familles */
    var familles=["Encres & consommables","Acier & profilés","Polymères / EPS","Quincaillerie","Vitrage","Transport & transit","Énergie & fluides","Emballage"];
    var artNoms=["Encre offset cyan 5kg","Plaque CTP 745x605","Bobine PEBD 50µ","Tôle acier 1.2mm","Profilé LGS 89mm","Bloc EPS 100kg/m³",
      "Charnière inox 100mm","Verre feuilleté 44.2","Solvant lavage 25L","Colle PU 310ml","Vis autoperceuse 4.8x38","Panneau sandwich 50mm",
      "Mousse PU bidon","Cornière alu 40x40","Profilé PVC dormant","Cartouche silicone","Palette transport","Film étirable 17µ",
      "Cadre serigraphie","Rouleau adhésif double face"];
    var articles=artNoms.map(function(nom,i){
      var pu=[18500,9200,1250000,890000,12800,45000,2200,38000,42000,3500,85,52000,7800,9500,6400,1900,8500,28000,15000,4200][i];
      var crit = [3,4,7,11,5,15].indexOf(i)>=0;
      return { id:"ART"+(200+i), code:"A"+(1000+i), nom:nom, famille:pick(familles), pu:pu,
        puStd:Math.round(pu*(0.95+Math.random()*0.12)),
        stock:rnd(0,400), secu:rnd(20,80), min:rnd(10,40), max:rnd(300,800),
        reserve:rnd(0,60), enCmd:rnd(0,120), transit:rnd(0,80),
        consoMoy:rnd(5,90), delaiAppro:rnd(7,60), critique:crit,
        fournisseurPref: fournisseurs[rnd(0,fournisseurs.length-1)].id };
    });

    var services=["Production Offset","Production Flexo","Extrusion","Atelier LGS","Atelier EPS","Maintenance","Magasin Central","Direction","Qualité","META POINT Akwa"];
    var acheteurs=["A. NGONO","B. FOTSO","C. MBALLA","D. TCHINDA","E. KAMGA"];

    /* Demandes d'achat */
    var statutsDA=["En attente","Validée","Transformée","Refusée"];
    var demandes=[]; for(var i=0;i<28;i++){
      var art=pick(articles), q=rnd(5,200), urgent=Math.random()<0.3;
      var dispo = art.stock>q;
      demandes.push({ id:"DA"+(5000+i), demandeur:pick(["J. Eboa","M. Sanou","R. Owona","L. Nkeng","S. Atangana"]),
        service:pick(services), articleId:art.id, qte:q, motif: Math.random()<0.18?"":pick(["Réappro production","Stock sécurité","Commande client","Maintenance préventive","Projet chantier"]),
        urgent:urgent, dateDemande:dOff(-rnd(1,40)), dateSouhaitee:dOff(rnd(-5,25)),
        statut:pick(statutsDA), acheteur:pick(acheteurs), validHier:Math.random()<0.7,
        budget:pick(services), dispoStock:dispo, fournisseurPropose:art.fournisseurPref,
        commande:null, commentaire:"", horsBudget:Math.random()<0.15, horsProc:Math.random()<0.12 });
    }

    /* Consultations & offres */
    var consultations=[]; for(var i=0;i<14;i++){
      var art=pick(articles), nFour=rnd(1,4), offres=[];
      var base=art.pu;
      for(var j=0;j<nFour;j++){
        var f=pick(fournisseurs);
        offres.push({ fournisseurId:f.id, prix:Math.round(base*(0.88+Math.random()*0.35)),
          delai:rnd(5,50), cond:f.cond, fraisAnnexes:rnd(0,80000), devise:"FCFA",
          validite:dOff(rnd(5,40)), docRecu:Math.random()<0.8, choisi:false });
      }
      offres.sort(function(a,b){return a.prix-b.prix;});
      var choix = Math.random()<0.25 ? rnd(0,offres.length-1) : 0; // parfois pas le moins cher
      offres[choix].choisi=true;
      consultations.push({ id:"CONS"+(700+i), articleId:art.id, qte:rnd(10,150),
        date:dOff(-rnd(2,30)), acheteur:pick(acheteurs), offres:offres,
        justifChoix: choix!==0 ? (Math.random()<0.5?"Meilleur délai":"") : "Meilleur prix",
        nbConsulteRequis:3 });
    }

    /* Commandes fournisseurs */
    var commandes=[]; for(var i=0;i<32;i++){
      var art=pick(articles), f=pick(fournisseurs), q=rnd(10,250);
      var pu=Math.round(art.pu*(0.9+Math.random()*0.3));
      var dCmd=dOff(-rnd(1,50)), prevue=dOff(rnd(-15,30));
      var retard = new Date(prevue)<new Date() && Math.random()<0.45;
      var liee = Math.random()<0.7;
      commandes.push({ id:"CMD"+(9000+i), fournisseurId:f.id, articleId:art.id, qte:q, pu:pu,
        montant:q*pu, devise:"FCFA", dateCmd:dCmd, livPrevue:prevue, livReelle: retard?null:(Math.random()<0.6?dOff(-rnd(0,5)):null),
        statut: retard?"En retard":pick(["En cours","Soldée","En cours","Validée"]),
        acheteur:pick(acheteurs), daLiee: liee?("DA"+(5000+rnd(0,27))):null,
        budget:pick(services), validee:Math.random()<0.78,
        consultee:Math.random()<0.72, modifApresValid:Math.random()<0.12,
        annuleeReprise:Math.random()<0.08, prixAnormal: pu>art.pu*1.18,
        homologue:f.homologue, heureSaisie:rnd(0,23) });
    }

    /* Réceptions */
    var receptions=[]; for(var i=0;i<24;i++){
      var c=pick(commandes); var qRecu=Math.round(c.qte*(0.85+Math.random()*0.3));
      var ecartQ = qRecu!==c.qte;
      receptions.push({ id:"REC"+(8000+i), commandeId:c.id, fournisseurId:c.fournisseurId, articleId:c.articleId,
        qteCmd:c.qte, qteRecu:qRecu, qteAccept:Math.round(qRecu*(Math.random()<0.85?1:0.9)),
        date:dOff(-rnd(0,20)), lot:Math.random()<0.85?("LOT-"+rnd(10000,99999)):"",
        controlee:Math.random()<0.8, controleur:pick(acheteurs.concat(["Magasin"])),
        docQualite:Math.random()<0.7, conforme:Math.random()<0.82, sansCommande:Math.random()<0.06,
        habilite:Math.random()<0.9, ecartQte:ecartQ });
    }

    /* Factures fournisseurs */
    var factures=[]; for(var i=0;i<26;i++){
      var c=pick(commandes); var rec=receptions.filter(function(r){return r.commandeId===c.id;})[0];
      var qFact=rec?rec.qteRecu:c.qte; var puFact=Math.round(c.pu*(0.97+Math.random()*0.12));
      var ht=qFact*puFact; var tva=Math.round(ht*Util.TVA);
      factures.push({ id:"FAC"+(7000+i), num:"FF-"+rnd(2024,2025)+"-"+rnd(1000,9999), fournisseurId:c.fournisseurId,
        commandeId:c.id, receptionId:rec?rec.id:null, articleId:c.articleId,
        qteFact:qFact, puFact:puFact, ht:ht, tauxTva:Util.TVA, tva:tva, ttc:ht+tva,
        transport:rnd(0,150000), date:dOff(-rnd(0,30)), echeance:dOff(rnd(5,60)), devise:"FCFA",
        sansReception: !rec, ecartPrix: Math.abs(puFact-c.pu)/c.pu>0.05, ecartQte: rec? (qFact!==rec.qteRecu):false,
        doublon:Math.random()<0.06, justifie:Math.random()<0.85, controlee:Math.random()<0.7,
        statut:pick(["À contrôler","Contrôlée","En anomalie","Validée"]) });
    }

    /* Budgets */
    var budgets=services.map(function(s){
      var b=rnd(8,60)*1000000; var real=Math.round(b*(0.4+Math.random()*0.8));
      return { service:s, alloue:b, realise:real, engage:Math.round(b*Math.random()*0.3), depasse:real>b };
    });

    /* Validations */
    var validations=[]; var objs=["Demande","Commande","Réception","Facture","Fournisseur","Achat urgent","Dépassement budget"];
    for(var i=0;i<30;i++){
      validations.push({ id:"VAL"+(6000+i), objet:pick(objs), ref:"REF-"+rnd(1000,9999),
        valideur:pick(acheteurs.concat(["DA","DG","Finance"])), date:dOff(-rnd(0,40)),
        niveau:pick(["P1","P2","P3","P4","P5"]), montant:rnd(50000,30000000),
        justif:Math.random()<0.75, commentaire:Math.random()<0.6?"OK conforme":"",
        doubleControle:Math.random()<0.55, rapide:Math.random()<0.2, habilite:Math.random()<0.9 });
    }

    /* Documents scannés */
    var typesDoc=["Devis","Proforma","Bon de commande","Bon de livraison","Facture","Certificat qualité","Document douanier","Document bancaire","Contrat","KYC fournisseur","Attestation fiscale"];
    var documents=[]; for(var i=0;i<22;i++){
      documents.push({ id:"DOC"+(4000+i), type:pick(typesDoc), fournisseurId:pick(fournisseurs).id,
        numero:"D-"+rnd(10000,99999), date:dOff(-rnd(0,60)), rapproche:Math.random()<0.7,
        coherent:Math.random()<0.78, montant:rnd(50000,8000000), lieRef:Math.random()<0.6?("CMD"+(9000+rnd(0,31))):null });
    }

    return { fournisseurs:fournisseurs, articles:articles, services:services, acheteurs:acheteurs,
      demandes:demandes, consultations:consultations, commandes:commandes, receptions:receptions,
      factures:factures, budgets:budgets, validations:validations, documents:documents };
  },

  /* helpers de résolution */
  four:function(id){ return DB.fournisseurs.filter(function(f){return f.id===id;})[0]||{nom:"?",note:0}; },
  art:function(id){ return DB.articles.filter(function(a){return a.id===id;})[0]||{nom:"?",pu:0}; }
};

/* ---------- JOURNAL (traçabilité) ---------- */
var Journal = {
  log:function(action,objet,detail,impact){
    var j=Store.get("journal",[]);
    j.unshift({ id:Util.uid("log"), ts:new Date().toISOString(), user:(App.state.user?App.state.user.name:"système"),
      action:action, objet:objet, detail:detail||"", impact:impact||"" });
    if(j.length>500) j=j.slice(0,500);
    Store.set("journal",j);
  },
  all:function(){ return Store.get("journal",[]); }
};
</script>
<script>
/* ============================================================
   MOTEUR TRANSVERSAL — Anomalies / Abus + Alertes (§10/§11)
   Priorités : info < warn < imp < crit
   ============================================================ */
var Anomalies = {
  _cache:null,
  all:function(){
    if(!this._cache){
      if(DB.anomalies_api && DB.anomalies_api.length){
        this._cache = DB.anomalies_api.map(function(a){
          return {
            cat: a.anomaly_type || "Anomalie",
            prio: (a.severity==="critique"?"crit":a.severity) || "info",
            objet: a.title || a.anomaly_type || "Anomalie",
            ref: a.reference || a.id || "",
            msg: a.description || a.suggestion || "",
            risk_score: a.risk_score,
            status: a.status,
            suggestion: a.suggestion,
            amount: a.amount,
            currency: a.currency,
            detected_at: a.detected_at,
            is_false_positive: a.is_false_positive,
            module: a.module,
            source_table: a.source_table
          };
        });
      } else {
        this._cache=this.scan();
      }
    }
    return this._cache;
  },
  refresh:function(){ this._cache=null; return this.all(); },
  add:function(L,cat,prio,objet,ref,msg){ L.push({cat:cat,prio:prio,objet:objet,ref:ref,msg:msg}); },

  scan:function(){
    var L=[], M=Seed.matrix, A=this.add;
    /* --- Demandes (procédure) --- */
    DB.demandes.forEach(function(d){
      var art=Seed.art(d.articleId);
      if(!d.motif) A(L,"Procédure","warn","Demande",d.id,"Demande sans justification");
      if(d.horsBudget) A(L,"Budget","imp","Demande",d.id,"Demande hors budget ("+d.service+")");
      if(d.statut==="En attente" && Util.daysBetween(d.dateDemande,Util.today())>10) A(L,"Procédure","imp","Demande",d.id,"Demande non traitée depuis "+Util.daysBetween(d.dateDemande,Util.today())+" j");
      if(d.dispoStock && d.statut!=="Refusée") A(L,"Procédure","warn","Demande",d.id,"Article déjà disponible en stock ("+art.nom+")");
      if(d.urgent && !d.validHier) A(L,"Procédure","imp","Demande",d.id,"Demande urgente non validée");
      if(d.horsProc) A(L,"Procédure","warn","Demande",d.id,"Demande créée hors procédure");
    });
    /* --- Consultations --- */
    DB.consultations.forEach(function(c){
      if(c.offres.length < c.nbConsulteRequis) A(L,"Consultation","imp","Consultation",c.id,"Consultation insuffisante ("+c.offres.length+"/"+c.nbConsulteRequis+" offres)");
      var offresPrix=c.offres.filter(function(o){return o.prix>0;});
      var choisi=offresPrix.filter(function(o){return o.choisi;})[0], min=offresPrix[0];
      if(choisi && min && choisi.prix>min.prix && !c.justifChoix) A(L,"Consultation","imp","Consultation",c.id,"Offre non optimale retenue sans justification (+"+Util.fcfa(choisi.prix-min.prix)+")");
    });
    /* --- Commandes (abus Sage) --- */
    var byFour={};
    DB.commandes.forEach(function(c){
      var f=Seed.four(c.fournisseurId), art=Seed.art(c.articleId);
      if(!c.validee) A(L,"Validation","imp","Commande",c.id,"Commande non validée");
      if(c.statut==="En retard") A(L,"Délai","imp","Commande",c.id,"Commande en retard chez "+f.nom);
      if(!c.daLiee) A(L,"Procédure","warn","Commande",c.id,"Commande sans demande d'achat");
      if(!c.consultee) A(L,"Consultation","warn","Commande",c.id,"Commande sans consultation");
      if(!c.homologue) A(L,"Abus","crit","Commande",c.id,"Commande auprès d'un fournisseur NON homologué ("+f.nom+")");
      if(c.modifApresValid) A(L,"Abus","crit","Commande",c.id,"Commande modifiée après validation");
      if(c.annuleeReprise) A(L,"Abus","warn","Commande",c.id,"Commande annulée puis ressaisie");
      if(c.prixAnormal) A(L,"Prix","imp","Commande",c.id,"Prix anormal sur "+art.nom+" ("+Util.fcfa(c.pu)+" vs std "+Util.fcfa(art.puStd)+")");
      if(c.heureSaisie<M.regles.heureDebutNormale||c.heureSaisie>=M.regles.heureFinNormale) A(L,"Abus","warn","Commande",c.id,"Opération à heure anormale ("+c.heureSaisie+"h)");
      var k=c.fournisseurId+"|"+art.famille; byFour[k]=(byFour[k]||0)+c.montant;
    });
    /* --- Fractionnement (cumul > palier sans validation du palier) --- */
    Object.keys(byFour).forEach(function(k){
      var total=byFour[k]; var p=Seed.palierFor(total);
      var parts=k.split("|");
      if(total>1000000 && (p.code==="P3"||p.code==="P4"||p.code==="P5")){
        A(L,"Abus","crit","Fournisseur",parts[0],"Fractionnement probable : cumul "+Util.fcfa(total)+" ("+parts[1]+") → palier "+p.code+" non couvert");
      }
    });
    /* --- Réceptions --- */
    DB.receptions.forEach(function(r){
      var f=Seed.four(r.fournisseurId);
      if(r.sansCommande) A(L,"Réception","crit","Réception",r.id,"Réception sans commande");
      if(r.qteRecu>r.qteCmd) A(L,"Réception","imp","Réception",r.id,"Réception supérieure à la commande (+"+(r.qteRecu-r.qteCmd)+")");
      if(!r.controlee) A(L,"Réception","warn","Réception",r.id,"Réception non contrôlée");
      if(!r.conforme) A(L,"Qualité","imp","Réception",r.id,"Article non conforme ("+f.nom+")");
      if(!r.lot) A(L,"Réception","warn","Réception",r.id,"Lot / n° de série non renseigné");
      if(!r.habilite) A(L,"Abus","imp","Réception",r.id,"Réception par une personne non habilitée");
    });
    /* --- Factures (contrôle 3 voies) --- */
    DB.factures.forEach(function(fac){
      var f=Seed.four(fac.fournisseurId);
      if(fac.sansReception) A(L,"Facture","crit","Facture",fac.num,"Facture sans réception");
      if(fac.doublon) A(L,"Facture","crit","Facture",fac.num,"Facture en double");
      if(fac.ecartPrix) A(L,"Facture","imp","Facture",fac.num,"Écart de prix commande / facture");
      if(fac.ecartQte) A(L,"Facture","imp","Facture",fac.num,"Écart de quantité réception / facture");
      if(!fac.justifie) A(L,"Facture","warn","Facture",fac.num,"Facture sans justificatif");
      if(Math.abs(fac.tva - fac.ht*Util.TVA)>1000) A(L,"Facture","imp","Facture",fac.num,"Taux de TVA incohérent");
    });
    /* --- Fournisseurs (référentiel) --- */
    DB.fournisseurs.forEach(function(f){
      if(!f.homologue) A(L,"Fournisseur","warn","Fournisseur",f.id,"Fournisseur non homologué : "+f.nom);
      if(!f.kyc) A(L,"Fournisseur","imp","Fournisseur",f.id,"KYC incomplet : "+f.nom);
      if(f.ribModifie) A(L,"Abus","crit","Fournisseur",f.id,"Coordonnées bancaires modifiées : "+f.nom+" (double validation requise)");
      if(f.risque==="remplacer") A(L,"Fournisseur","imp","Fournisseur",f.id,"Fournisseur à risque/remplacer : "+f.nom+" (note "+f.note+")");
    });
    /* --- Validations --- */
    DB.validations.forEach(function(v){
      if(!v.justif) A(L,"Validation","imp","Validation",v.id,"Validation "+v.objet+" sans justificatif");
      if(v.rapide) A(L,"Validation","warn","Validation",v.id,"Validation trop rapide ("+v.objet+")");
      if(!v.habilite) A(L,"Validation","crit","Validation",v.id,"Validation par personne non habilitée");
      var p=Seed.palierFor(v.montant);
      if((p.code==="P3"||p.code==="P4"||p.code==="P5") && !v.doubleControle) A(L,"Validation","imp","Validation",v.id,"Palier "+p.code+" sans double contrôle (montant "+Util.fcfa(v.montant)+")");
      if(p.comment && !v.commentaire) A(L,"Validation","warn","Validation",v.id,"Commentaire obligatoire manquant (palier "+p.code+")");
    });
    /* --- Stocks / réappro --- */
    DB.articles.forEach(function(a){
      if(a.stock<=0) A(L,"Stock","crit","Article",a.id,"Rupture de stock : "+a.nom);
      else if(a.stock<a.secu) A(L,"Stock","imp","Article",a.id,"Stock sous seuil de sécurité : "+a.nom+" ("+a.stock+"/"+a.secu+")");
      if(a.critique && !Seed.four(a.fournisseurPref).homologue) A(L,"Stock","imp","Article",a.id,"Article critique sans fournisseur homologué actif : "+a.nom);
    });
    /* --- Documents --- */
    DB.documents.forEach(function(d){
      if(!d.coherent) A(L,"Document","warn","Document",d.id,"Incohérence document/Sage : "+d.type+" "+d.numero);
    });
    return L;
  },
  byPrio:function(p){ return this.all().filter(function(a){return a.prio===p;}); },
  byCat:function(c){ return this.all().filter(function(a){return a.cat===c;}); }
};

var PRIO_RANK={info:0,warn:1,imp:2,crit:3};
var PRIO_LABEL={info:"Information",warn:"Attention",imp:"Important",crit:"Critique"};

var Alerts = {
  all:function(){
    var done=Store.get("alertsDone",{});
    return Anomalies.all().map(function(a,i){
      var id="AL"+i;
      return { id:id, prio:a.prio, cat:a.cat, objet:a.objet, ref:a.ref, msg:a.msg, done:!!done[id] };
    }).sort(function(x,y){ return PRIO_RANK[y.prio]-PRIO_RANK[x.prio]; });
  },
  toggle:function(id){
    var done=Store.get("alertsDone",{}); done[id]=!done[id]; Store.set("alertsDone",done);
    Journal.log(done[id]?"Traitement alerte":"Réouverture alerte","Alerte",id);
  }
};

var C = {

function scoreOffre(o,minPrix,minDelai,four){
  var sPrix = minPrix/o.prix*40;                 // 40 pts prix
  var sDelai= minDelai/o.delai*25;               // 25 pts délai
  var sNote = four.note/100*20;                  // 20 pts fiabilité
  var sDoc  = (o.docRecu?10:0);                  // 10 pts conformité doc
  var sHom  = (four.homologue?5:0);              //  5 pts homologation
  return Math.round(sPrix+sDelai+sNote+sDoc+sHom);
}
function consCompare(id){
  var c=DB.consultations.filter(function(x){return x.id===id;})[0]; var art=Seed.art(c.articleId);
  if(!c.offres.length || c.offres.filter(function(o){return o.prix>0&&o.delai>0;}).length===0){
    var info='<p class="muted" style="margin-bottom:14px">Article : <b>'+Util.esc(art.nom)+'</b> · quantité '+c.qte+' · consultation du '+Util.date(c.date)+'</p>';
    if(c.source==="fallback_da") info+='<p style="margin-bottom:14px">'+C.pill("Source DA","info")+" Les tables RFQ Sage sont vides ; cette consultation est dérivée des demandes d'achat. Les prix, délais et critères de choix ne sont pas disponibles.</p>";
    info+=C.table([
      {t:"Fournisseur",r:function(o){var f=Seed.four(o.fournisseurId); return Util.esc(f.nom||o.nom||o.fournisseurId)+(f.homologue?"":' '+C.pill("non homol.","crit"));}},
      {t:"Prix unit.",r:function(){return '<span class="muted">NA</span>';}},
      {t:"Délai",r:function(){return '<span class="muted">NA</span>';}},
      {t:"Document",r:function(o){return o.docRecu?C.pill("reçu","ok"):'<span class="muted">NA</span>';}}
    ],c.offres);
    Modal.open("Consultation — "+id,info,'<button class="btn ghost" data-mclose>Fermer</button>');
    return;
  }
  var minPrix=Math.min.apply(null,c.offres.map(function(o){return o.prix;}));
  var minDelai=Math.min.apply(null,c.offres.map(function(o){return o.delai;}));
  var scored=c.offres.map(function(o){ var f=Seed.four(o.fournisseurId); var tco=o.prix*c.qte+o.fraisAnnexes; return {o:o,f:f,tco:tco,score:scoreOffre(o,minPrix,minDelai,f)}; }).sort(function(a,b){return b.score-a.score;});
  var best=scored[0];
  var body='<p class="muted" style="margin-bottom:14px">Article : <b>'+Util.esc(art.nom)+'</b> · quantité '+c.qte+' · consultation du '+Util.date(c.date)+'</p>';

/* --- MRP : moteur de recommandation --- */
function mrpNeeds(){
  return DB.articles.map(function(a){
    var dispo=a.stock+a.transit+a.enCmd-a.reserve;
    var pointCmd=a.secu+Math.round(a.consoMoy/30*a.delaiAppro);
    var besoin=pointCmd-dispo;
    var f=Seed.four(a.fournisseurPref);
    var couvre=a.consoMoy?Math.round(a.stock/a.consoMoy*30):999;
    var prio = a.stock<=0?"crit": dispo<a.secu?"imp": besoin>0?"warn":"info";
    return { art:a, dispo:dispo, pointCmd:pointCmd, qteReco:besoin>0?Math.max(besoin,a.min):0,
      besoin:besoin, four:f, prio:prio, couvre:couvre,
      dateReco: besoin>0?(function(){var d=new Date();d.setDate(d.getDate()+Math.max(0,couvre-a.delaiAppro));return d.toISOString().slice(0,10);})():null };
  }).filter(function(x){return x.qteReco>0;}).sort(function(a,b){return PRIO_RANK[b.prio]-PRIO_RANK[a.prio];});
}
App.views.mrp=function(){
  var needs=mrpNeeds();
  var html='<div class="page-head"><h1>MRP / Aide au réapprovisionnement</h1><p>Anticiper les besoins — articles à commander, quantités et dates recommandées</p></div>';
  html+='<div class="kpis">'+
    C.kpi({label:"Articles à commander",val:needs.length,dim:"brand"})+
    C.kpi({label:"Urgents (rupture)",val:needs.filter(function(n){return n.prio==="crit";}).length,dim:"crit"})+
    C.kpi({label:"Risque rupture",val:needs.filter(function(n){return n.prio==="imp";}).length,dim:"imp"})+
    C.kpi({label:"Valeur réappro",val:Util.num(Math.round(needs.reduce(function(s,n){return s+n.qteReco*n.art.pu;},0)/1000000))+" M",sub:"FCFA",dim:"ok"})+
  '</div>';
  html+='<div class="card"><div class="card-h"><h3>Propositions de réapprovisionnement</h3></div><div class="card-b flush">';
  html+=C.table([
    {t:"Prio",r:function(n){return C.prioPill(n.prio);}},
    {t:"Article",r:function(n){return Util.esc(n.art.nom);}},
    {t:"Dispo",num:true,r:function(n){return n.dispo;}},
    {t:"Pt cmd",num:true,r:function(n){return n.pointCmd;}},
    {t:"Qté reco.",num:true,r:function(n){return '<b class="mono">'+n.qteReco+'</b>';}},

    {t:"Fournisseur",r:function(n){return Util.esc(n.four.nom)+(n.four.homologue?"":' '+C.pill("non homol.","crit"));}},
    {t:"Montant",num:true,r:function(n){return '<span class="mono">'+Util.fcfa(n.qteReco*n.art.pu)+'</span>';}}

function toCSV(rows){
  if(!rows.length) return "";
  var keys=Object.keys(rows[0]);
  var esc=function(v){ v=(v===null||v===undefined)?"":String(v); return '"'+v.replace(/"/g,'""')+'"'; };
  return keys.join(";")+"\n"+rows.map(function(r){ return keys.map(function(k){return esc(r[k]);}).join(";"); }).join("\n");
}
function download(name,content,mime){
  var blob=new Blob(["\ufeff"+content],{type:mime||"text/csv;charset=utf-8"});
  var url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url; a.download=name; a.click(); setTimeout(function(){URL.revokeObjectURL(url);},1000);
}

/* --- Agent IA : fallback local + branchement n8n / Anthropic --- */
var IA = {
  cfg:function(){ return Store.get("iaCfg",{webhook:"",useAnthropic:false}); },
  setCfg:function(c){ Store.set("iaCfg",c); },
  suggestions:[
    "Quelles commandes fournisseurs sont en retard ?",
    "Quels articles risquent d'être en rupture ?",
    "Quel fournisseur propose le meilleur prix ?",
    "Quels fournisseurs posent le plus de problèmes ?",
    "Quelles factures présentent des écarts ?",
    "Y a-t-il des achats suspects dans Sage X3 ?",
    "Quels budgets achats sont dépassés ?",
    "Quelles actions traiter en urgence ?",
    "Synthèse du jour"
  ],
  /* moteur local d'analyse */
  answer:function(q){
    var t=q.toLowerCase();
    var H=function(title,lines){ return "**"+title+"**\n"+lines.join("\n"); };
    if(/retard.*command|command.*retard/.test(t)){
      var r=DB.commandes.filter(function(c){return c.statut==="En retard";});
      return H(r.length+" commande(s) en retard :", r.slice(0,8).map(function(c){return "• "+c.id+" — "+Seed.four(c.fournisseurId).nom+" — liv. prévue "+Util.date(c.livPrevue);}));
    }
    if(/rupture|stock/.test(t)){
      var ru=DB.articles.filter(function(a){return a.stock<=0;}), ss=DB.articles.filter(function(a){return a.stock>0&&a.stock<a.secu;});
      return H("Risques de stock :",["• Ruptures : "+ru.length+" article(s) — "+ru.slice(0,5).map(function(a){return a.nom;}).join(", ")]
        .concat(["• Sous seuil de sécurité : "+ss.length+" article(s)"]).concat(["→ Voir module MRP pour les réapprovisionnements recommandés."]));
    }
    if(/meilleur prix|moins cher|negoci/.test(t)){
      var lines=DB.consultations.slice(0,5).map(function(c){var o=c.offres[0];return "• "+Seed.art(c.articleId).nom+" : "+Seed.four(o.fournisseurId).nom+" à "+Util.fcfa(o.prix);});
      return H("Meilleures offres par consultation :",lines);
    }
    if(/probleme|risque.*fournisseur|fournisseur.*risque|fiable/.test(t)){
      var fr=DB.fournisseurs.slice().sort(function(a,b){return a.note-b.note;}).slice(0,5);
      return H("Fournisseurs à surveiller (note la plus basse) :",fr.map(function(f){return "• "+f.nom+" — note "+f.note+"/100 — "+f.risque+(f.homologue?"":" (non homologué)");}));
    }
    if(/facture.*ecart|ecart.*facture|facture/.test(t)){
      var fe=DB.factures.filter(function(f){return f.ecartPrix||f.ecartQte||f.sansReception||f.doublon;});
      return H(fe.length+" facture(s) en écart :",fe.slice(0,8).map(function(f){return "• "+f.num+" — "+Seed.four(f.fournisseurId).nom+" — "+(f.sansReception?"sans réception":f.doublon?"doublon":f.ecartPrix?"écart de prix":"écart de quantité");}));
    }
    if(/suspect|abus|fraude|anormal/.test(t)){
      var ab=Anomalies.byCat("Abus");
      return H(ab.length+" opération(s) suspecte(s) dans Sage X3 :",ab.slice(0,8).map(function(a){return "• ["+PRIO_LABEL[a.prio]+"] "+a.msg;}));
    }
    if(/budget/.test(t)){
      var bd=DB.budgets.filter(function(b){return b.depasse;});
      return H(bd.length+" budget(s) dépassé(s) :",bd.map(function(b){return "• "+b.service+" — réalisé "+Util.fcfa(b.realise)+" / alloué "+Util.fcfa(b.alloue)+" ("+Math.round(b.realise/b.alloue*100)+"%)";}));
    }
    if(/urgen|action|prioritaire/.test(t)){
      var cr=Anomalies.byPrio("crit");
      return H(cr.length+" action(s) critique(s) à traiter :",cr.slice(0,8).map(function(a){return "• "+a.objet+" "+a.ref+" — "+a.msg;}));
    }
    if(/synth|resume|rapport|jour/.test(t)){
      var an=Anomalies.all();
      return H("Synthèse du jour — "+Util.date(Util.today()),[
        "• Anomalies : "+an.filter(function(a){return a.prio==="crit";}).length+" critiques, "+an.filter(function(a){return a.prio==="imp";}).length+" importantes",
        "• Demandes en attente : "+DB.demandes.filter(function(d){return d.statut==="En attente";}).length,
        "• Commandes en retard : "+DB.commandes.filter(function(c){return c.statut==="En retard";}).length,
        "• Factures à contrôler : "+DB.factures.filter(function(f){return f.statut==="À contrôler";}).length,
        "• Ruptures de stock : "+DB.articles.filter(function(a){return a.stock<=0;}).length,
        "→ Recommandation : traiter en priorité les fournisseurs non homologués et les factures sans réception."]);
    }
    return "Je peux analyser : demandes/commandes en retard, ruptures et réappro (MRP), meilleurs prix, fiabilité fournisseurs, écarts de factures, achats suspects, budgets dépassés et actions urgentes. Reformulez ou utilisez une suggestion ci-dessus.";
  }
};

App.afterRender.params=function(){

      if(ro){
        html+='<tr><td><b>'+p.code+'</b></td><td class="num mono">'+Util.num(p.min)+'</td><td class="num mono">'+(p.max===null?"∞":Util.num(p.max))+'</td>'+

    body.querySelectorAll("tr[data-i]").forEach(function(tr){

    });

var Session = {
  token:null, refreshToken:null, parsed:null, _timer:null,
  _url:function(p){ var c=window.APP_CONFIG;
    return c.keycloakUrl.replace(/\/+$/,"")+"/realms/"+encodeURIComponent(c.realm)+"/protocol/openid-connect/"+p; },
  _form:function(o){ return Object.keys(o).filter(function(k){return o[k]!=null && o[k]!=="";})
    .map(function(k){return encodeURIComponent(k)+"="+encodeURIComponent(o[k]);}).join("&"); },
  _parse:function(jwt){ try{
    return JSON.parse(decodeURIComponent(escape(atob(jwt.split(".")[1].replace(/-/g,"+").replace(/_/g,"/"))))); }
    catch(e){ return {}; } },
  groups:function(){ return ((this.parsed&&this.parsed.groups)||[])
    .map(function(g){ return g[0]==="/"?g.slice(1):g; }); },
  login:function(username, password){
    var c=window.APP_CONFIG, self=this;
    return fetch(this._url("token"), {
      method:"POST", headers:{"Content-Type":"application/x-www-form-urlencoded"},
      body:this._form({ grant_type:"password", client_id:c.clientId, client_secret:c.clientSecret,
                        username:username, password:password, scope:"openid" })
    }).then(function(r){ return r.json().then(function(j){ return {ok:r.ok, j:j}; }); })
      .then(function(res){
        if(!res.ok){ throw new Error(res.j.error_description || res.j.error || "Identifiants invalides"); }
        self._set(res.j); return self.parsed;
      });
  },
  _set:function(j){
    this.token=j.access_token; this.refreshToken=j.refresh_token; this.parsed=this._parse(j.access_token);
    if(this._timer) clearTimeout(this._timer);
    var ms = Math.max(15, (j.expires_in||300)-30)*1000;
    this._timer = setTimeout(function(){ Session.refresh().catch(function(){}); }, ms);
  },
  refresh:function(){
    var c=window.APP_CONFIG, self=this;
    if(!this.refreshToken) return Promise.reject(new Error("Pas de refresh token"));
    return fetch(this._url("token"), {
      method:"POST", headers:{"Content-Type":"application/x-www-form-urlencoded"},
      body:this._form({ grant_type:"refresh_token", client_id:c.clientId,
                        client_secret:c.clientSecret, refresh_token:this.refreshToken })
    }).then(function(r){ if(!r.ok) throw new Error("Refresh echoue"); return r.json(); })
      .then(function(j){ self._set(j); return j; });
  },
  logout:function(){
    var c=window.APP_CONFIG, rt=this.refreshToken;
    if(this._timer) clearTimeout(this._timer);
    this.token=this.refreshToken=this.parsed=null;
    if(rt){ fetch(this._url("logout"), { method:"POST",
      headers:{"Content-Type":"application/x-www-form-urlencoded"},
      body:Session._form({ client_id:c.clientId, client_secret:c.clientSecret, refresh_token:rt })
    }).catch(function(){}); }
  }
};

var Api = {
  base:function(){ return window.APP_CONFIG.apiBase.replace(/\/+$/,""); },
  _qs:function(params){
    if(!params) return "";
    var pairs=[];
    for(var k in params){ if(params[k]!=null && params[k]!=="") pairs.push(encodeURIComponent(k)+"="+encodeURIComponent(params[k])); }
    return pairs.length ? "&"+pairs.join("&") : "";
  },
  get:function(path, params){
    var qs = Api._qs(params);
    var full = Api.base()+path + (path.indexOf("?")>=0 ? qs : (qs ? "?"+qs.slice(1) : ""));
    function call(){ return fetch(full, { headers:{ "Authorization":"Bearer "+Session.token } }); }
    return call().then(function(r){
      if(r.status===401){ return Session.refresh().then(call); }
      return r;
    }).then(function(r){
      if(r.status===403){ throw new Error("Acces refuse (groupe achat requis)"); }
      if(!r.ok){ throw new Error("HTTP "+r.status+" sur "+path); }
      return r.json();
    });
  }
};

var ApiFilters = {
  state:{ requisitions:{limit:500,offset:0}, rfqs:{limit:500,offset:0}, orders:{limit:500,offset:0}, receipts:{limit:500,offset:0}, invoices:{limit:500,offset:0} },
  params:function(key, extra){
    var s=this.state[key]||{}, p={limit:s.limit||500, offset:s.offset||0};
    if(s.date_debut) p.date_debut=s.date_debut;
    if(s.date_fin) p.date_fin=s.date_fin;
    Object.keys(extra||{}).forEach(function(k){ if(extra[k]!==""&&extra[k]!=null) p[k]=extra[k]; });
    return p;
  },
  matchDate:function(key, value){
    var s=this.state[key]||{};
    var d=this.isoDate(value);
    if(s.date_debut && (!d || d<s.date_debut)) return false;
    if(s.date_fin && (!d || d>s.date_fin)) return false;
    return true;
  },
  isoDate:function(value){
    if(!value) return "";
    var v=String(value).trim();
    var m=v.match(/^([0-9]{4})-([0-9]{2})-([0-9]{2})/);
    if(m) return m[1]+"-"+m[2]+"-"+m[3];
    m=v.match(/^([0-9]{8})$/);
    if(m) return v.slice(0,4)+"-"+v.slice(4,6)+"-"+v.slice(6,8);
    m=v.match(/^([0-9]{2})\/([0-9]{2})\/([0-9]{4})$/);
    if(m) return m[3]+"-"+m[2]+"-"+m[1];
    var d=new Date(v);
    return isNaN(d.getTime()) ? "" : d.toISOString().slice(0,10);
  },
  bar:function(key, label){
    var s=this.state[key]||{};
    return '<div class="filters" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:10px 14px;border-bottom:1px solid var(--line)">'+
      '<span class="muted">'+Util.esc(label||"Filtres API")+'</span>'+
      '<input class="input" type="date" id="'+key+'Debut" value="'+Util.esc(s.date_debut||'')+'" style="width:150px">'+
      '<input class="input" type="date" id="'+key+'Fin" value="'+Util.esc(s.date_fin||'')+'" style="width:150px">'+
      '<select class="input" id="'+key+'Limit" style="width:110px"><option>50</option><option>100</option><option>200</option><option>500</option></select>'+
      '<button class="btn ghost sm" id="'+key+'Prev">Préc.</button>'+
      '<span class="muted">page '+(Math.floor((s.offset||0)/(s.limit||500))+1)+'</span>'+
      '<button class="btn ghost sm" id="'+key+'Next">Suiv.</button>'+
      '<button class="btn primary sm" id="'+key+'Apply">Appliquer</button>'+
    '</div>';
  },
  bind:function(key, endpointKey, extraFn, renderFn){
    var s=this.state[key]||{}; this.state[key]=s;
    var lim=document.getElementById(key+"Limit"); if(lim) lim.value=String(s.limit||500);
    var apply=function(delta){
      s.date_debut=(document.getElementById(key+"Debut")||{}).value||"";
      s.date_fin=(document.getElementById(key+"Fin")||{}).value||"";
      s.limit=Number((document.getElementById(key+"Limit")||{}).value)||500;
      s.offset=Math.max(0,(s.offset||0)+(delta||0)*s.limit);
      var filters={}; filters[endpointKey]=ApiFilters.params(key, extraFn?extraFn():{});
      toast("Rechargement des données...", "info");
      Seed.loadFromApi(filters).then(function(db){ DB=db; Router.go(App.state.route); toast("Données rechargées", "ok"); })
        .catch(function(e){ toast(e.message||"Erreur API", "crit"); });
    };
    var a=document.getElementById(key+"Apply"), p=document.getElementById(key+"Prev"), n=document.getElementById(key+"Next");
    if(a) a.addEventListener("click",function(){
      s.date_debut=(document.getElementById(key+"Debut")||{}).value||"";
      s.date_fin=(document.getElementById(key+"Fin")||{}).value||"";
      s.limit=Number((document.getElementById(key+"Limit")||{}).value)||500;
      s.offset=0;
      if(renderFn) renderFn();
      toast("Filtre appliqué sur les données chargées", "ok");
    });
    if(p) p.addEventListener("click",function(){ apply(-1); });
    if(n) n.addEventListener("click",function(){ apply(1); });
    [key+"Debut",key+"Fin",key+"Limit"].forEach(function(id){
      var el=document.getElementById(id);
      if(el) el.addEventListener("change",function(){
        s.date_debut=(document.getElementById(key+"Debut")||{}).value||"";
        s.date_fin=(document.getElementById(key+"Fin")||{}).value||"";
        s.limit=Number((document.getElementById(key+"Limit")||{}).value)||500;
        if(renderFn) renderFn();
      });
    });
  }
};

Seed.loadFromApi = function(filters){
  filters = filters || {};
  var db = Seed.build();
  return Promise.all([
    Api.get("/reference/suppliers", Object.assign({limit:1000,offset:0}, filters.suppliers||{})),
    Api.get("/reference/articles", Object.assign({limit:1000,offset:0}, filters.articles||{})),
    Api.get("/orders", Object.assign({limit:500,offset:0}, filters.orders||{})),
    Api.get("/invoices", Object.assign({limit:500,offset:0}, filters.invoices||{})),
    Api.get("/receipts", Object.assign({limit:500,offset:0}, filters.receipts||{})),
    Api.get("/requisitions", Object.assign({limit:500,offset:0}, filters.requisitions||{})),
    Api.get("/rfqs", Object.assign({limit:500,offset:0}, filters.rfqs||{})),
    Api.get("/invoices/three-way-match?limit=2000", filters.tw),
    Api.get("/anomalies?limit=500", filters.anomalies)
  ]).then(function(res){
    var suppliers=Array.isArray(res[0])?res[0]:(res[0]&&res[0].items)||[];
    var articles=Array.isArray(res[1])?res[1]:(res[1]&&res[1].items)||[];
    var orders=res[2].items, invoices=res[3].items, receipts=res[4].items;
    var reqs=res[5].items, rfqs=res[6].items, tw=res[7].items;
    var anomalies=res[8].items;
    db.anomalies_api = anomalies || [];
    db.fournisseurs = suppliers.map(function(s){
      return { id:s.id, nom:s.nom||s.id, pays:s.pays||"", devise:s.devise||"",
               categorie:s.categorie||"-", cond:s.cond||"-",
               niu:s.niu||"", rccm:s.rccm||"",
               homologue:s.homologue!=null?!!s.homologue:true,
               risque:s.risque||"Non évalué",
               note:s.note!=null?s.note:0,
               kyc:s.kyc!=null?!!s.kyc:false,
               nbCommandes:s.nb_commandes||0, montantTotal:s.montant_total_ht||0,
               derniereCommande:s.derniere_commande||null,
               fournisseurPref:s.id,
               delaiMoyen:s.delai_moyen||0, tauxConf:s.taux_confiance||0,
               retards:s.retards||0, ribModifie:s.rib_modifie||false,
               dateCreation:s.date_creation||null }; });
    db.articles = articles.map(function(a){
      return { id:a.code, code:a.code, nom:a.nom||a.code, famille:a.famille||"-",
               pu:a.pu!=null?a.pu:(a.pu_moyen||0),
               puStd:a.pu_std!=null?a.pu_std:0,
               montantTotal:a.montant_total||0, qteTotale:a.qte_totale||0,
               nbLignes:a.nb_lignes||0,
               critique:a.critique!=null?!!a.critique:(a.statut==="inactive"||a.statut==="bloqué"),
               stock:a.stock!=null?a.stock:0, stockSecu:a.stock_secu!=null?a.stock_secu:0, secu:a.stock_secu!=null?a.stock_secu:0,
               consoMoy:_na(a.conso_moy,0), delaiAppro:_na(a.delai_appro,0), transit:_na(a.transit,0), enCmd:_na(a.en_cmd,0),
               reserve:_na(a.reserve,0), min:_na(a.min,0), max:_na(a.max,0), fournisseurPref:_na(a.fournisseur_pref,null) }; });
    function _na(v,def){ return v==="NA"?def:v; }
    db.commandes = orders.map(function(o){
      var q=o.qte||0;
      return { id:o.id, ref:o.reference||o.id, fournisseurId:o.fournisseur_id, articleId:o.article_principal||null, qte:q,
               nbLignes:o.nb_lignes||0, acheteur:o.acheteur||"-",
               nbReceptions:o.nb_receptions||0, nbFactures:o.nb_factures||0,
               pu:o.pu!=null?o.pu:(q?Math.round((o.montant_ht||0)/q):0), montant:o.montant_ht||0,
               statut:o.statut||"-", date:o.date, livPrevue:o.liv_prevue||null, livReelle:o.liv_reelle||null,
               daLiee:o.da_liee||null, validee:o.validee!=null?!!o.validee:true,
               consultee:!!_na(o.consultee,false), modifApresValid:!!_na(o.modif_apres_valid,false),
               prixAnormal:!!_na(o.prix_anormal,false), homologue:!!_na(o.homologue,true),
               heureSaisie:o.heure_saisie||null, budget:_na(o.budget,null) }; });
    var twByInv={};
    tw.forEach(function(t){ var k=t.facture; if(!twByInv[k]) twByInv[k]={cmd:null,rec:null,sansRec:false,ecartPrix:false,ecartQte:false};
      if(t.commande&&!twByInv[k].cmd) twByInv[k].cmd=t.commande;
      if(t.reception&&!twByInv[k].rec) twByInv[k].rec=t.reception;
      if(!t.a_reception) twByInv[k].sansRec=true; });
    db.factures = invoices.map(function(f){ var m=twByInv[f.id]||{}; var ht=f.montant_ht||0, ttc=f.montant_ttc||0;
      var hasEcart = !f.conforme;
      var tauxTva=_na(f.taux_tva,0); if(tauxTva>1) tauxTva=tauxTva/100;
      return { id:f.id, num:f.num_fournisseur||f.id, fournisseurId:f.fournisseur_id,
               commandeId:m.cmd||null, receptionId:m.rec||null, articleId:f.article_id||null,
               ht:ht, ttc:ttc, statut:f.statut||"-",
               nbLignes:f.nb_lignes||0, conforme:!!f.conforme,
               ecartPrix:hasEcart, ecartQte:!!_na(f.ecart_qte,!!m.ecartQte), doublon:!!_na(f.doublon,false),
               sansCommande:!!f.sans_commande,
               sansReception:(f.sans_reception!=null?!!f.sans_reception:!!m.sansRec), date:f.date,
               qteFact:f.qte_fact||0, puFact:f.pu_fact||0, tauxTva:tauxTva,
               tva:_na(f.tva,Math.max(0,ttc-ht)),
               transport:_na(f.transport,0), echeance:f.echeance||null,
               justifie:!!_na(f.justifie,true), controlee:!!_na(f.controlee,false) }; });
    db.receptions = receipts.map(function(r){
      return { id:r.id, commandeId:r.commande_id||null, fournisseurId:r.fournisseur_id, articleId:r.article_id||null,
               qte:r.qte||0, qteCmd:_na(r.qte_cmd,0), qteRecu:r.qte_recu||0, qteAccept:_na(r.qte_accept,0), montant:r.montant_ht||0,
               date:r.date, dateArrivee:r.date_arrivee||null,
               facturee:!!r.facturee, conforme:!!r.conforme, controlee:!!r.controlee,
               ecartQte:!!_na(r.ecart_qte,false), lot:_na(r.lot,null),
               controleur:_na(r.controleur,null), docQualite:!!_na(r.doc_qualite,false),
               sansCommande:!!_na(r.sans_commande,false), habilite:!!_na(r.habilite,true) }; });
    db.demandes = reqs.map(function(d){
      return { id:d.id, demandeur:d.demandeur||"-", service:d.site||"-", articleId:d.article_principal||null,
               qte:d.qte||0, motif:d.motif||"",
               fournisseurPropose:d.fournisseur_propose||null, montant:d.montant||0, palier:d.palier,
               statut:d.statut||"En attente", date:d.date,
               dateDemande:d.date, dateSouhaitee:d.date_souhaitee||null,
               acheteur:d.acheteur||"-", urgent:!!_na(d.urgent,false), horsBudget:!!_na(d.hors_budget,false) }; });
    db.consultations = rfqs.map(function(c){
      var offres=(c.offres||[]).map(function(o){
                 return { fournisseurId:o.fournisseur_id, nom:o.nom||o.fournisseur_id, prix:_na(o.prix,0), delai:_na(o.delai,0),
                          cond:_na(o.cond,"-"), fraisAnnexes:_na(o.frais_annexes,0), devise:_na(o.devise,"FCFA"),
                          validite:o.validite, docRecu:!!_na(o.doc_recu,false), choisi:!!_na(o.choisi,false) };
               });
      offres.sort(function(a,b){ if(a.prix<=0&&b.prix<=0) return 0; if(a.prix<=0) return 1; if(b.prix<=0) return -1; return a.prix-b.prix; });
      return { id:c.id, articleId:c.article_principal||null, qte:c.qte||0,
               offres:offres,
               date:c.date, acheteur:c.acheteur||"-",
               nbConsulteRequis:_na(c.nb_consulte_requis,c.source==="fallback_da"?0:3),
               justifChoix:_na(c.justif_choix,""),
               source:c.source||"sage_rfq" }; });
    return db;
  });
};

Auth.login = function(){};
Auth.logout = function(){
  Session.logout(); App.state.user=null; Store.del("route");
  document.getElementById("shell").classList.remove("on");
  var l=document.getElementById("login"); if(l) l.style.display="flex";
  var p=document.getElementById("kcPass"); if(p) p.value="";
  Boot.renderLoginForm();
};

Boot.renderLoginForm = function(){
  var form=document.getElementById("loginForm");
  var err=document.getElementById("kcErr");
  var btn=document.getElementById("kcSubmit");
  if(!form) return;
  form.onsubmit = function(e){
    e.preventDefault();
    err.style.display="none";
    var u=document.getElementById("kcUser").value.trim();
    var p=document.getElementById("kcPass").value;
    if(!u || !p) return;
    btn.disabled=true; btn.textContent="Connexion...";
    Session.login(u,p).then(function(tp){
      if(Session.groups().indexOf(window.APP_CONFIG.requiredGroup) < 0){
        throw new Error("Votre compte n'appartient pas au groupe \u00ab "+window.APP_CONFIG.requiredGroup+" \u00bb.");
      }
      var name=tp.name||tp.preferred_username||u;
      App.state.user={ role:"acheteur", name:name,
        initials:name.split(" ").map(function(w){return w[0];}).slice(0,2).join("").toUpperCase(),
        username:tp.preferred_username, email:tp.email };
      btn.textContent="Chargement des donnees...";
      return Seed.loadFromApi();
    }).then(function(db){
      DB=db; Seed.matrix=Seed.defaultMatrix(); Store.set("seeded",1);
      btn.disabled=false; btn.textContent="Se connecter";
      Boot.enter();
    }).catch(function(ex){
      err.textContent = ex && ex.message ? ex.message : String(ex);
      err.style.display="block";
      btn.disabled=false; btn.textContent="Se connecter";
    });
  };
};

Boot.init = function(){
  var th=Store.get("theme","light"); document.documentElement.setAttribute("data-theme",th);
  document.getElementById("btnTheme").addEventListener("click", this.toggleTheme);
  document.getElementById("btnLogout").addEventListener("click", function(){ Auth.logout(); });
  document.getElementById("btnAlerts").addEventListener("click", function(){ Router.go("alertes"); });
  var l=document.getElementById("login"); if(l) l.style.display="flex";
  Boot.renderLoginForm();
};


Boot.init();
</script>
